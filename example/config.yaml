# Example configuration file for k8s-flock
# Place this file at ~/.config/k8s-flock/config.yaml
# Or use it with the --config flag: ./k8s-flock --config config-example.yaml

# Default namespace to use when viewing resources
defaultNamespace: "default"

# List of preferred contexts to automatically select on startup
# These contexts will be selected when the application starts
# If a context doesn't exist, it will be ignored
preferredContexts:
  - "kind-cluster-2"
  - "kind-cluster-1"
  - "kind-cluster-3"

# Refresh interval in seconds for automatic resource updates
# The UI will automatically refresh resource views at this interval
# Set to 0 to disable automatic refresh
refreshInterval: 5

# Sort contexts alphabetically when displaying resources
# If true, contexts will be sorted alphabetically regardless of preferred order
# If false, contexts will maintain the order specified in preferredContexts
sortContextsAlphabetically: true

# Per-context configuration overrides
# Use this to set custom kubeconfig paths or colors for specific contexts
contexts:
  - name: "kind-cluster-1"
    color: "#00FF00"
  - name: "kind-cluster-2"
    kubeconfig: "/path/to/custom/kubeconfig"
    color: "#FF8000"
  - name: "kind-cluster-3"
    kubeconfig: "/path/to/another/kubeconfig"
